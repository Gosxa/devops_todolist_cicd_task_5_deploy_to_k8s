name: Reusable Deploy to Kind
on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      image_tag:
        required: true
        type: string
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true
jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      ENVIRONMENT: ${{ inputs.environment }}
      DockerImageName: todoapp
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create kind cluster
        run: |
          kind create cluster --name kind-${{ env.ENVIRONMENT }} --config cluster.yml
      - name: Set up KUBECONFIG
        run: |
          kind get kubeconfig --name kind-${{ env.ENVIRONMENT }} > $HOME/.kube/config
          echo "KUBECONFIG=$HOME/.kube/config" >> $GITHUB_ENV

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull and load image to Kind
        run: |
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DockerImageName }}:${{ inputs.image_tag }}
          kind load docker-image ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DockerImageName }}:${{ inputs.image_tag }} --name kind-${{ env.ENVIRONMENT }}

      - name: Helm dry-run
        run: |
          helm upgrade --install todoapp ./helm-charts/todoapp \
            --namespace todoapp-${{ env.ENVIRONMENT }} \
            --create-namespace \
            --set image.repository=${{ secrets.DOCKERHUB_USERNAME }}/todoapp \
            --set image.tag=${{ inputs.image_tag }} \
            --values ./helm-charts/todoapp/values.yaml \
            --atomic \
            --dry-run

      - name: Helm deploy
        run: |
          helm upgrade --install todoapp ./helm-charts/todoapp \
            --namespace todoapp-${{ env.ENVIRONMENT }} \
            --create-namespace \
            --set image.repository=${{ secrets.DOCKERHUB_USERNAME }}/todoapp \
            --set image.tag=${{ inputs.image_tag }} \
            --values ./helm-charts/todoapp/values.yaml \
            --atomic